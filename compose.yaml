services:
    microsoft-rewards-script:
        build: .
        image: microsoft-rewards-script:local
        container_name: microsoft-rewards-script
        restart: unless-stopped
        volumes:
            - ./config:/usr/src/microsoft-rewards-script/dist/config
            - ./sessions:/usr/src/microsoft-rewards-script/dist/browser/sessions
        environment:
            # ── 调度 ──────────────────────────────────────────────────────
            TZ: "Asia/Shanghai"
            NODE_ENV: 'production'
            CRON_SCHEDULE: '0 9 * * *'
            RUN_ON_START: 'true'
            MIN_SLEEP_MINUTES: '5'
            MAX_SLEEP_MINUTES: '50'

            # ── 账号（敏感信息通过 .env 传入）─────────────────────────────
            ACCOUNT_1_EMAIL: ${ACCOUNT_1_EMAIL}
            ACCOUNT_1_PASSWORD: ${ACCOUNT_1_PASSWORD}
            ACCOUNT_1_GEO_LOCALE: 'cn'
            ACCOUNT_1_LANG_CODE: 'zh'
            # 如需 2FA，取消下行注释并在 .env 中设置
            #ACCOUNT_1_TOTP_SECRET: ${ACCOUNT_1_TOTP_SECRET}
            # 多账号按 ACCOUNT_2_* 递增

            # ── 搜索与查询源 ─────────────────────────────────────────────
            CONFIG_QUERY_ENGINES: 'china,local'
            CONFIG_SEARCH_DELAY_MIN: '30sec'
            CONFIG_SEARCH_DELAY_MAX: '1min'
            # gmya.net appkey，填入解除免费档限流（留空走免费档）
            CONFIG_CHINA_API_APPKEY: ''

            # ── PushPlus 微信推送 ────────────────────────────────────────
            CONFIG_PUSHPLUS_ENABLED: 'true'
            CONFIG_PUSHPLUS_TOKEN: '改成你的pushplus_token'
            CONFIG_PUSHPLUS_TITLE: 'Microsoft-Rewards-Script'
            CONFIG_PUSHPLUS_TEMPLATE: 'html'

            # ── 任务开关（全部开启）───────────────────────────────────────
            CONFIG_WORKER_DAILY_SET: 'true'
            CONFIG_WORKER_MORE_PROMOTIONS: 'true'
            CONFIG_WORKER_PUNCH_CARDS: 'true'
            CONFIG_WORKER_DESKTOP_SEARCH: 'true'
            CONFIG_WORKER_MOBILE_SEARCH: 'true'
            CONFIG_WORKER_DAILY_CHECKIN: 'true'

        healthcheck:
            test: ['CMD', 'sh', '-c', 'pgrep cron > /dev/null || exit 1']
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 30s

        security_opt:
            - no-new-privileges:true
